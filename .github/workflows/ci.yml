name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nim
        uses: iffy/install-nim@v5
        with:
          version: stable

      - name: Run unit tests
        # config.nims in the repo root already injects --mm:orc --threads:on;
        # the flags here are explicit redundancy so CI is self-documenting.
        run: |
          nim compile --mm:orc --threads:on -r tests/test_anyvalue.nim
          nim compile --mm:orc --threads:on -r tests/test_proto.nim
          nim compile --mm:orc --threads:on -r tests/test_resource.nim
          nim compile --mm:orc --threads:on -r tests/test_traces.nim
          nim compile --mm:orc --threads:on -r tests/test_logs.nim
          nim compile --mm:orc --threads:on -r tests/test_metrics.nim
          nim compile --mm:orc --threads:on -r tests/test_json_encode.nim
          nim compile --mm:orc --threads:on -r tests/test_config.nim
          nim compile --mm:orc --threads:on -r tests/test_exporter_http.nim
          nim compile --mm:orc --threads:on -r tests/test_partial_success.nim
          nim compile --mm:orc --threads:on -r tests/test_retry.nim
          nim compile --mm:orc --threads:on -r tests/test_batch.nim
          nim compile --mm:orc --threads:on -r tests/test_umbrella.nim
          nim compile --mm:orc --threads:on -r tests/test_record.nim
          nim compile --mm:orc --threads:on -r tests/integration/test_harness.nim

      - name: Compile examples
        run: |
          nim compile --path:src --mm:orc --threads:on -o:/dev/null examples/traces.nim
          nim compile --path:src --mm:orc --threads:on -o:/dev/null examples/logs.nim
          nim compile --path:src --mm:orc --threads:on -o:/dev/null examples/metrics.nim

      - name: Start OTel collector
        # No --wait: the distroless contrib image has no healthcheck command, so
        # readiness is gated by the harness's waitForCollector() in the next step.
        run: docker compose up -d

      - name: Run integration tests (live collector)
        # -d:liveCollector enables the harness's live waitForCollector check (polls
        # :13133, up to 30s), which is the real readiness gate. Per-signal
        # integration tests (observy-1yo/39x/xj4) will be added here as they land.
        run: nim compile --mm:orc --threads:on -d:liveCollector -r tests/integration/test_harness.nim

      - name: Stop collector
        if: always()
        run: docker compose down -v
