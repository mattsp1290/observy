services:
  otelcol:
    image: otel/opentelemetry-collector-contrib:0.119.0
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./collector-config.yml:/etc/otelcol-contrib/config.yaml:ro
      - ./collector-output:/collector-output
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "13133:13133" # health check
    # No container healthcheck: the contrib image is distroless (no wget/curl/sh),
    # so a CMD healthcheck can't run. Readiness is gated from the host instead —
    # the integration harness's waitForCollector() polls :13133 (see CI).
